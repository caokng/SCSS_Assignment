        <h1>My Spacing</h1> 
        
<p>This is my Spacing Frame.  Spaces 8- 16 will be for form fields and captions under images. Spaces 32- 64 will be for bigger elements on the page such as menus and paragraphs under Headings.</p>

<div class="spacing-container">
  <div class="label">spacing-100 (4px)</div>
  <div class="spacing spacing-100"></div>
</div>

<br/>

<div class="spacing-container">
  <div class="label">spacing-200 (8px)</div>
  <div class="spacing spacing-200"></div>
</div>

<br/>

<div class="spacing-container">
  <div class="label">spacing-300 (16px)</div>
  <div class="spacing spacing-300"></div>
</div>

<br/>

<div class="spacing-container">
  <div class="label">spacing-400 (32px)</div>
  <div class="spacing spacing-400"></div>
</div>

<br/>

<div class="spacing-container">
  <div class="label">spacing-500 (64px)</div>
  <div class="spacing spacing-500"></div>
</div>
